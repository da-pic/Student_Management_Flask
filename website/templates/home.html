<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Sinh viên</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss/dist/tailwind.min.css">
  <script src="https://unpkg.com/feather-icons"></script>
</head>
<body class="bg-gradient-to-r from-blue-200 to-blue-50 min-h-screen flex relative">

  <!-- Sidebar -->
  <aside class="w-64 bg-white shadow-lg rounded-r-3xl p-5 flex flex-col justify-between">
    <div>
      <h1 class="text-2xl font-bold text-blue-600 mb-6">QLSV</h1>
      <nav id="sidebar" class="space-y-3">
        <button data-target="hoso" class="w-full text-left block p-3 rounded-xl bg-blue-200 active-link">👤 Hồ sơ</button>
        <button data-target="lop-hanh-chinh" class="w-full text-left block p-3 rounded-xl hover:bg-blue-200">🏫 Lớp hành chính</button>
        <button data-target="lop-tin-chi" class="w-full text-left block p-3 rounded-xl hover:bg-blue-200">📘 Lớp tín chỉ</button>
        <button data-target="hoc-tap" class="w-full text-left block p-3 rounded-xl hover:bg-blue-200">📝 Kết quả học tập</button>

        <!-- Nút Tính năng -->
        <div class="mt-8 bg-white shadow rounded-xl">
          <button id="toggleFeatures" class="w-full flex items-center justify-between p-4 text-left font-semibold text-blue-600">
            🔧 Tính năng
            <i id="arrow" data-feather="chevron-down" class="transition-transform"></i>
          </button>
          <div id="featuresList" class="hidden border-t p-4 space-y-2">
            <a href="dangky.html" class="block p-3 bg-blue-100 rounded-lg hover:bg-blue-200">
              📌 Đăng ký tín chỉ
            </a>
            <a href="khungchuongtrinh.html" class="block p-3 bg-blue-100 rounded-lg hover:bg-blue-200">
              📌 Khung chương trình đào tạo
            </a>
            <a href="lichthi.html" class="block p-3 bg-blue-100 rounded-lg hover:bg-blue-200">
              📌 Lịch thi
            </a>
          </div>
        </div>
      </nav>
    </div>

    <!-- Chatbot icon -->
    <div class="mb-5">
      <button id="chatbotToggle" class="p-3 bg-blue-500 text-white rounded-full shadow-lg hover:bg-blue-600">
        💬
      </button>
    </div>
  </aside>

  <!-- Main content -->
  <main class="flex-1 p-10 relative">
    <!-- Nội dung hiển thị động -->
    <div id="content">
      <!-- Mặc định hiện Hồ sơ -->
      <h1 class="text-3xl font-bold text-gray-700 mb-4">👤 Hồ sơ</h1>
      <hr class="border-gray-300 mb-6">

      <div class="bg-white shadow rounded-xl p-6">
        <table class="w-full text-left border-collapse">
          <tr>
            <th class="p-2 text-gray-600">Mã SV</th>
            <td class="p-2 font-semibold text-gray-800">{{ student.student_id }}</td>
          </tr>
          <tr>
            <th class="p-2 text-gray-600">Họ tên</th>
            <td class="p-2">{{ student.student_name }}</td>
          </tr>
          <tr>
            <th class="p-2 text-gray-600">Email</th>
            <td class="p-2">{{ student.student_email }}</td>
          </tr>
          <tr>
            <th class="p-2 text-gray-600">Lớp hành chính</th>
            <td class="p-2">{{ student.administrative_class }}</td>
          </tr>
          <tr>
            <th class="p-2 text-gray-600">CPA</th>
            <td class="p-2 text-blue-600 font-bold">{{ student.CPA }}</td>
          </tr>
        </table>
      </div>
    </div>
  </main>

  <!-- Chatbot box -->
  <div id="chatbotBox" class="hidden fixed bottom-20 left-72 w-80 bg-white shadow-lg rounded-2xl p-4">
    <h3 class="text-lg font-semibold text-blue-600 mb-3">Chatbot</h3>
    <div class="h-40 overflow-y-auto border rounded-lg p-2 mb-3 text-sm text-gray-600">
      <p><strong>Bot:</strong> Xin chào! Tôi có thể giúp gì cho bạn?</p>
    </div>
    <form class="flex space-x-2">
      <input type="text" placeholder="Nhập câu hỏi..." class="flex-1 border rounded-lg p-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
      <button type="submit" class="bg-blue-500 text-white px-3 rounded-lg hover:bg-blue-600">Gửi</button>
    </form>
  </div>

  <script>
    feather.replace();

    const buttons = document.querySelectorAll("#sidebar button[data-target]");
    const content = document.getElementById("content");

    const pages = {
      "lop-hanh-chinh": {
        title: "🏫 Lớp hành chính",
        text: "Thông tin về lớp hành chính của bạn."
      },
      "lop-tin-chi": {
        title: "📘 Lớp tín chỉ",
        text: "Danh sách lớp tín chỉ mà bạn đã đăng ký."
      },
      "hoc-tap": {
        title: "📝 Kết quả học tập",
        text: "Điểm số và kết quả học tập của bạn."
      }
    };

    buttons.forEach(btn => {
      btn.addEventListener("click", () => {
        buttons.forEach(b => b.classList.remove("bg-blue-200", "active-link"));
        btn.classList.add("bg-blue-200", "active-link");

        const target = btn.dataset.target;

        if (target === "hoso") {
          content.innerHTML = `
            <h1 class="text-3xl font-bold text-gray-700">👤 Hồ sơ</h1>
            <hr class="border-gray-300 mb-6">
            <div class="bg-white shadow rounded-xl p-6">
              <table class="w-full text-left border-collapse">
                <tr><th class="p-2 text-gray-600">Mã SV</th><td class="p-2 font-semibold text-gray-800">{{ student.student_id }}</td></tr>
                <tr><th class="p-2 text-gray-600">Họ tên</th><td class="p-2">{{ student.student_name }}</td></tr>
                <tr><th class="p-2 text-gray-600">Email</th><td class="p-2">{{ student.student_email }}</td></tr>
                <tr><th class="p-2 text-gray-600">Lớp hành chính</th><td class="p-2">{{ student.administrative_class }}</td></tr>
                <tr><th class="p-2 text-gray-600">CPA</th><td class="p-2 text-blue-600 font-bold">{{ student.CPA }}</td></tr>
              </table>
            </div>
          `;
        } else if (target === "hoc-tap") {
          content.innerHTML = `
            <h1 class="text-3xl font-bold text-gray-700">${pages[target].title}</h1>
            <p class="mt-4 text-gray-600">${pages[target].text}</p>
            <div class="bg-white shadow rounded-xl p-6 mt-4">
              <table class="w-full text-left border-collapse">
                <tr><th class="p-2 text-gray-600">Môn học</th><th class="p-2 text-gray-600">Điểm</th></tr>
                <tr><td class="p-2">Cơ sở dữ liệu</td><td class="p-2 font-semibold text-blue-600">8.5</td></tr>
                <tr><td class="p-2">Lập trình Java</td><td class="p-2 font-semibold text-blue-600">9.0</td></tr>
              </table>
            </div>
          `;
        } else {
          content.innerHTML = `
            <h1 class="text-3xl font-bold text-gray-700">${pages[target].title}</h1>
            <p class="mt-4 text-gray-600">${pages[target].text}</p>
          `;
        }
      });
    });

    // Toggle Tính năng
    const toggleBtn = document.getElementById("toggleFeatures");
    const featuresList = document.getElementById("featuresList");
    const arrow = document.getElementById("arrow");

    toggleBtn.addEventListener("click", () => {
      featuresList.classList.toggle("hidden");
      arrow.classList.toggle("rotate-180"); // xoay icon
    });

    // Chatbot toggle
    const chatbotToggle = document.getElementById('chatbotToggle');
    const chatbotBox = document.getElementById('chatbotBox');
    chatbotToggle.addEventListener('click', () => {
      chatbotBox.classList.toggle('hidden');
    });
  </script>
</body>
</html>
